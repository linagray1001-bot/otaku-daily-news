baseURL = "https://example.com/"
languageCode = "en-us"
title = "Otaku Daily News"
enableRobotsTXT = true

[pagination]
  pagerSize = 12

[params]
  description = "Daily anime and movie news"
  author = "Otaku Daily News Team"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "daily"
  priority = 0.8

[markup.goldmark.renderer]
  unsafe = true
